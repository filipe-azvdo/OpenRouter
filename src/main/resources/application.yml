spring:
  application:
    name: personal-router
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:postgres}?sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: prisma-pg-pool
      # Pool fixo e enxuto: min = max evita churn (recomendação do autor do Hikari)
      maximum-pool-size: 10
      minimum-idle: 10
      # Recicla a conexão MUITO antes do Prisma matar por ociosidade (30 min)
      max-lifetime: 1500000          # 25 min
      # Mantém viva / detecta conexão morta antes de entregar pro app
      keepalive-time: 300000         # 5 min
      # Tempo esperando uma conexão livre do pool
      connection-timeout: 30000      # 30 s
      # Hikari valida sozinho via JDBC4 isValid(); validation-timeout é o teto
      validation-timeout: 5000
      # Detecta vazamento de conexão (conexão não devolvida) — útil em fintech
      leak-detection-threshold: 60000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        # Transforma o N+1 das coleções lazy (stops + tollPlazas) em poucas queries IN (...)
        default_batch_fetch_size: 50
  flyway:
    enabled: true
  mvc:
    problemdetails:
      enabled: true

ors:
  api:
    base-url: https://api.openrouteservice.org
    key: ${ORS_API_KEY}
    connect-timeout-ms: 3000
    read-timeout-ms: 10000
    retry:
      max-attempts: 3
      period-ms: 200
      max-period-ms: 1000

logging:
  level:
    com.personalrouter.client.OpenRouteServiceClient: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
