# Perfil de teste "h2" (KAN-12): fallback em memória para validar a camada de persistência
# (migration Flyway + mapeamento JPA) quando o Docker não está disponível.
# H2 em MODE=PostgreSQL para máxima compatibilidade com o Postgres de produção; o caminho
# Testcontainers/Postgres continua sendo a autoridade quando há Docker.
spring:
  datasource:
    url: jdbc:h2:mem:personalrouter;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      # Mantém o contrato schema <-> entidades validado também no caminho H2.
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
