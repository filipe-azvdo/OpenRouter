name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & verify
        run: ./mvnw verify --batch-mode --no-transfer-progress

      # --- Checkstyle: inline annotations on PR (visibility) ---

      - name: Setup reviewdog
        if: always() && github.event_name == 'pull_request'
        uses: reviewdog/action-setup@v1

      - name: Checkstyle annotations
        if: always() && github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f target/checkstyle-result.xml ]; then
            reviewdog -f=checkstyle -reporter=github-pr-check -filter-mode=file \
              < target/checkstyle-result.xml || true
          fi

      # --- JaCoCo: coverage comment + patch coverage gate ---

      - name: Check JaCoCo XML exists
        id: jacoco-xml
        if: always()
        run: |
          [ -f target/site/jacoco/jacoco.xml ] && echo "exists=true" >> "$GITHUB_OUTPUT" || true

      - name: Coverage report
        id: coverage
        if: >-
          always() &&
          github.event_name == 'pull_request' &&
          steps.jacoco-xml.outputs.exists == 'true'
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: '80'
          min-coverage-changed-files: '80'
          title: Coverage Report
          update-comment: 'true'

      - name: Enforce patch coverage gate
        if: >-
          always() &&
          github.event_name == 'pull_request' &&
          steps.coverage.outcome == 'success'
        env:
          CHANGED_COV: ${{ steps.coverage.outputs.coverage-changed-files }}
        run: |
          if [ -z "$CHANGED_COV" ]; then
            echo "No changed-files coverage data — skipping gate"
            exit 0
          fi
          threshold=80
          if awk "BEGIN {exit (!($CHANGED_COV < $threshold))}"; then
            echo "::error::Patch coverage ${CHANGED_COV}% is below ${threshold}%"
            exit 1
          fi
          echo "Patch coverage: ${CHANGED_COV}% (threshold: ${threshold}%)"
